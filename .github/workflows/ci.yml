name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run ruff check
        run: uv run ruff check src tests

      - name: Run ruff format check
        run: uv run ruff format --check src tests

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Install libomp (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm libomp

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Build Cython extension
        run: make build

      - name: Build & Run C unit tests
        run: make test-c

      - name: Run Python unit tests
        run: uv run pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Build package
        run: uv build

      - name: Smoke test wheel
        run: |
          pip install dist/*.whl --force-reinstall
          python -c "from rnd.trapezoid_rnm import compute_trapz_rnm; print('OK')"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
